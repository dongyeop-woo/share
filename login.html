<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breaking Share | 로그인</title>
    <link rel="stylesheet" href="assets/styles.css">
    <script src="assets/app.js" defer></script>
    <script src="assets/login.js" defer></script>
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <span class="brand-mark" aria-hidden="true">📈</span>
            <div>
                <p class="brand-name">Breaking Share</p>
                <p class="brand-tagline">지금 가장 빠른 주식 인사이트</p>
            </div>
        </div>
        <nav class="site-nav" aria-label="주요 메뉴"></nav>
        <div class="header-actions">
            <a class="auth-trigger" id="auth-toggle" href="login.html" aria-current="page">로그인</a>
            <div class="auth-status" id="auth-status" hidden>
                <span id="auth-display-name"></span>
                <button class="auth-logout" id="auth-logout" type="button">로그아웃</button>
            </div>
        </div>
    </header>

    <main class="content-section">
        <article class="highlight-card" style="max-width: 520px; margin: 0 auto;">
            <header>
                <h1>계정에 로그인</h1>
                <p>Breaking Share 계정으로 로그인하거나 새로 가입해 주세요.</p>
            </header>
            <div class="auth-header">
                <button class="auth-tab active" data-mode="login" type="button" aria-pressed="true">로그인</button>
                <button class="auth-tab" data-mode="register" type="button" aria-pressed="false">회원가입</button>
            </div>
            <form class="auth-form" id="auth-form" novalidate>
                <div class="auth-field">
                    <label for="auth-email">이메일</label>
                    <input id="auth-email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
                </div>
                <div class="auth-field">
                    <label for="auth-password">비밀번호</label>
                    <input id="auth-password" name="password" type="password" autocomplete="current-password" placeholder="비밀번호" required>
                </div>
                <div class="auth-field" id="auth-displayname-field" hidden>
                    <label for="auth-displayname">닉네임</label>
                    <input id="auth-displayname" name="displayName" type="text" autocomplete="nickname" placeholder="닉네임" minlength="2" maxlength="40">
                </div>
                <button class="cta-button full-width" id="auth-submit" type="submit">로그인</button>
                <p class="auth-message" id="auth-message" role="status" aria-live="polite"></p>
            </form>
        </article>
    </main>

    <footer class="site-footer">
        <div>
            <p class="footer-brand">Breaking Share</p>
            <p class="footer-copy">© 2025 Breaking Share. All rights reserved.</p>
        </div>
        <nav aria-label="하단 메뉴">
            <a href="index.html#policies">이용 약관</a>
            <a href="index.html#policies">개인정보 처리방침</a>
            <a href="index.html#recommendations">추천 종목</a>
        </nav>
    </footer>
</body>
</html>
